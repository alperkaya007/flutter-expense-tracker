name: flutter_expense_tracker
description: A feature-rich expense tracking app with Firebase backend.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  google_sign_in: ^6.2.1
  fl_chart: ^0.66.0
  flutter_riverpod: ^2.4.9
  go_router: ^13.0.0
  intl: ^0.18.1
  uuid: ^4.2.1
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true